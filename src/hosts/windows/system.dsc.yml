# WinGet DSC v3 - system-level baseline for Windows host
# Package ID policy: prefer human-readable named IDs (for example
# `Microsoft.PowerToys`) over opaque Microsoft Store-generated IDs. Use
# generated IDs only when the Store package has no stable named identifier.
properties:
  configurationVersion: 0.2.0
  resources:
    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure 7-Zip is installed with CLI PATH integration and shell extensions for cross-host archive handling parity with macOS (Keka) and NixOS (File Roller + Ark)
      settings:
        id: 7zip.7zip
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure WhatsApp Beta is installed to mirror the macOS beta-channel application baseline; Microsoft Store currently exposes only generated ID `9NBDXK71NK08` (no stable named alias)
      settings:
        id: 9NBDXK71NK08
        source: msstore

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure Source Serif 4 is installed as the open-source serif baseline (SIL OFL) for Windows font parity with POSIX hosts using pkgs.source-serif
      settings:
        id: Adobe.SourceSerif4
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure zoxide is installed for cross-host shell navigation parity with macOS and NixOS
      settings:
        id: ajeetdsouza.zoxide
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure uv is installed for cross-host Python workflow parity with macOS and NixOS
      settings:
        id: astral-sh.uv
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: >-
          Blender — 3D creation suite for modelling, animation, rendering, and video
          editing. Cross-platform parity with macOS (Homebrew cask) and NixOS (nixpkgs).
      settings:
        id: BlenderFoundation.Blender
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure ripgrep is installed for cross-host search tooling parity with macOS and NixOS
      settings:
        id: BurntSushi.ripgrep
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure bottom is installed for cross-host terminal monitoring parity with macOS and NixOS
      settings:
        id: Clement.bottom
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure JetBrains Mono Nerd Font is installed as the open-source terminal monospace + icon baseline for Windows font parity with POSIX hosts
      settings:
        id: DEVCOM.JetBrainsMonoNerdFont
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure direnv is installed for cross-host per-directory environment parity with macOS and NixOS
      settings:
        id: direnv.direnv
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure Discord Canary is installed to match the macOS canary-channel declaration
      settings:
        id: Discord.Discord.Canary
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure eza is installed for cross-host shell listing parity with macOS and NixOS
      settings:
        id: eza-community.eza
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: >-
          GIMP — raster image editor. Cross-platform parity with macOS (Homebrew cask)
          and NixOS (nixpkgs).
      settings:
        id: GIMP.GIMP
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      id: GitInstall
      directives:
        description: Ensure Git is installed
      settings:
        id: Git.Git
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure Gpg4win is installed
      settings:
        id: GnuPG.Gpg4win
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure Chrome is installed
      settings:
        id: Google.Chrome
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure Chrome Canary is installed to mirror the macOS canary-channel browser declaration
      settings:
        id: Google.Chrome.Canary
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure Chrome Remote Desktop Host is installed to mirror the macOS remote-access host declaration
      settings:
        id: Google.ChromeRemoteDesktopHost
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure Noto Sans CJK SC is installed for Simplified Chinese sans-serif coverage on Windows, matching pkgs.noto-fonts-cjk-sans on POSIX hosts
      settings:
        id: Google.NotoSans.CJK.SC
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure Noto Sans CJK TC is installed for Traditional Chinese sans-serif coverage on Windows, completing the Simplified+Traditional parity required by repository policy
      settings:
        id: Google.NotoSans.CJK.TC
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure Noto Serif CJK SC is installed for Simplified Chinese serif coverage on Windows, matching pkgs.noto-fonts-cjk-serif on POSIX hosts
      settings:
        id: Google.NotoSerif.CJK.SC
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure Noto Serif CJK TC is installed for Traditional Chinese serif coverage on Windows, completing the Simplified+Traditional parity required by repository policy
      settings:
        id: Google.NotoSerif.CJK.TC
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure FFmpeg is installed for cross-host multimedia processing and transcoding parity with macOS and NixOS; GPL build from gyan.dev includes comprehensive open-source codec support (x264, x265, AAC, Opus, and others)
      settings:
        id: Gyan.FFmpeg
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: >-
          QtPass — Qt GUI frontend for gopass/pass. Parity with NixOS (nixpkgs qtpass);
          macOS excluded because the Homebrew cask fails Gatekeeper checks.
      settings:
        id: IJHack.QtPass
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure Inter is installed as the open-source sans-serif UI baseline (SIL OFL) for Windows font parity with POSIX hosts using pkgs.inter
      settings:
        id: Inter.Inter
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure prek is installed for cross-host pre-commit hook manager parity with macOS and NixOS
      settings:
        id: j178.Prek
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure jq is installed for cross-host JSON tooling parity with macOS and NixOS
      settings:
        id: jqlang.jq
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure fzf is installed for cross-host fuzzy finder parity with macOS and NixOS
      settings:
        id: junegunn.fzf
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: >-
          Krita — digital painting and illustration editor. Cross-platform parity with
          macOS (Homebrew cask) and NixOS (nixpkgs).
      settings:
        id: KDE.Krita
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure PowerShell (`pwsh`) is installed for cross-host shell and script parity with macOS and NixOS
      settings:
        id: Microsoft.PowerShell
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure Microsoft PowerToys is installed for Windows productivity tooling; Raycast (`9PFXXSHC64H3`) is intentionally not used on Windows and Rectangle is macOS-specific
      settings:
        id: Microsoft.PowerToys
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure Visual Studio Code is installed
      settings:
        id: Microsoft.VisualStudioCode
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure Visual Studio Code Insiders is installed to match the dual-channel editor baseline declared for macOS and NixOS
      settings:
        id: Microsoft.VisualStudioCode.Insiders
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: >-
          Windows Terminal Preview — preferred over stable per repository policy
          (preview/beta channels are favoured when available).  Provides "Open in
          Windows Terminal" context menu option in Explorer for cross-platform parity
          with macOS (Terminal/iTerm) and NixOS (GNOME Terminal/Konsole).
      settings:
        id: Microsoft.WindowsTerminal.Preview
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure Neovim is installed to mirror the default-editor baseline declared on macOS and NixOS
      settings:
        id: Neovim.Neovim
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure Obsidian is installed to mirror the macOS GUI package declaration
      settings:
        id: Obsidian.Obsidian
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: >-
          Ensure Ollama is installed as the local LLM inference backend for
          cross-host AI parity with macOS (launchd user agent) and NixOS
          (system services.ollama unit).  The WinGet installer registers Ollama
          as a background service that starts at user login and binds to
          127.0.0.1:11434 by default.
      settings:
        id: Ollama.Ollama
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      id: BunInstall
      directives:
        description: >-
          Ensure Bun is installed as the global JS runtime and package manager; provides
          `bun` CLI for running JS ecosystem tools and `bun install -g` for global package
          installs (for example pi-coding-agent).  Bun fills the last tier of the install
          hierarchy (winget > scoop > cargo binstall > bun) for JS-only tools absent from
          all higher tiers.
      settings:
        id: Oven-sh.Bun
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure Parsec is installed to mirror the macOS low-latency remote-desktop package declaration
      settings:
        id: Parsec.Parsec
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure rustup is installed for cross-host Rust toolchain parity with macOS and NixOS
      settings:
        id: Rustlang.Rustup
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      id: ScoopInstall
      directives:
        description: >-
          Scoop user-space package manager for portable CLI utilities not
          available in WinGet (e.g. cargo-binstall).  Git is required by Scoop
          for bucket management and updates; declared via dependsOn to ensure
          Git is present before Scoop initialises.
      settings:
        id: Scoop.Scoop
        source: winget
      dependsOn:
        - GitInstall

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure SOPS is installed
      settings:
        id: SecretsOPerationS.SOPS
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure bat is installed for cross-host shell utility parity with macOS and NixOS
      settings:
        id: sharkdp.bat
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure fd is installed for cross-host file search parity with macOS and NixOS
      settings:
        id: sharkdp.fd
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure ShellCheck is installed for cross-host shell script linting parity with macOS and NixOS
      settings:
        id: ShellCheck.ShellCheck
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure opencode is installed for cross-host agent tooling parity with macOS and NixOS
      settings:
        id: SST.opencode
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure Telegram Desktop Beta is installed to mirror the macOS beta-channel messaging baseline
      settings:
        id: Telegram.TelegramDesktop.Beta
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: >-
          LibreOffice — open-source office suite. Cross-platform parity with macOS
          (Homebrew cask) and NixOS (nixpkgs).
      settings:
        id: TheDocumentFoundation.LibreOffice
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: >-
          Ensure Typst is installed as the command-line document-composition
          compiler for cross-host parity with macOS and NixOS (pkgs.typst);
          pairs with the Tinymist language server managed by VS Code extension
          sync on all platforms.
      settings:
        id: Typst.Typst
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: Ensure VLC media player is installed to mirror the macOS GUI package declaration
      settings:
        id: VideoLAN.VLC
        source: winget

    - resource: Microsoft.WinGet.Client/Package
      directives:
        description: >-
          Zoom — video conferencing client. Cross-platform parity with macOS (Homebrew
          cask) and NixOS (nixpkgs zoom-us).
      settings:
        id: Zoom.Zoom
        source: winget

    - resource: Microsoft.Windows.Settings/DeveloperMode
      directives:
        description: Enable Developer Mode
      settings:
        Enabled: true

    - resource: Microsoft.Windows.Settings/Taskbar
      directives:
        description: Keep a centered large taskbar for improved visibility
      settings:
        Alignment: Center
        Size: Large

    - resource: Microsoft.Windows.Registry/RegistryValue
      directives:
        description: Enable long path support so Nix store paths and deep Git worktrees do not hit the default 260-character Windows path limit
      settings:
        keyPath: HKLM\System\CurrentControlSet\Control\FileSystem
        valueName: LongPathsEnabled
        valueData: 1
        valueType: DWord

    - resource: Microsoft.Windows.Registry/RegistryValue
      directives:
        description: >-
          Allow inbound Remote Desktop connections by clearing the deny flag on
          the TermService registry key.  Setting fDenyTSConnections to 0 is
          required for the Windows built-in RDP server to accept connections;
          the default value of 1 blocks all inbound RDP sessions regardless of
          firewall state.
      settings:
        keyPath: HKLM\System\CurrentControlSet\Control\Terminal Server
        valueName: fDenyTSConnections
        valueData: 0
        valueType: DWord

    - resource: Microsoft.Windows.Registry/RegistryValue
      directives:
        description: >-
          Require Network Level Authentication (NLA) for Remote Desktop
          connections.  NLA forces clients to authenticate before a full desktop
          session is established, which reduces the attack surface compared to
          the legacy mode that authenticates only after presenting the login
          screen.
      settings:
        keyPath: HKLM\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp
        valueName: UserAuthentication
        valueData: 1
        valueType: DWord

    - resource: Microsoft.Windows.Registry/RegistryValue
      directives:
        description: >-
          Substitute Courier New with JetBrains Mono so applications that
          request the traditional monospace generic fall back to the open-source
          coding baseline; mirrors the fontconfig defaultFonts.monospace
          declaration on POSIX hosts
      settings:
        keyPath: HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\FontSubstitutes
        valueName: Courier New
        valueData: JetBrains Mono
        valueType: String

    - resource: Microsoft.Windows.Registry/RegistryValue
      directives:
        description: >-
          Substitute Helvetica with Inter so applications that request the
          traditional Latin sans-serif generic fall back to the open-source UI
          baseline; Helvetica is not present on Windows so this substitution
          is safe and non-disruptive
      settings:
        keyPath: HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\FontSubstitutes
        valueName: Helvetica
        valueData: Inter
        valueType: String

    - resource: Microsoft.Windows.Registry/RegistryValue
      directives:
        description: >-
          Substitute Times New Roman with Source Serif 4 so applications that
          request the traditional serif generic fall back to the open-source
          document baseline; mirrors the fontconfig defaultFonts.serif
          declaration on POSIX hosts
      settings:
        keyPath: HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\FontSubstitutes
        valueName: Times New Roman
        valueData: Source Serif 4
        valueType: String

    - resource: Microsoft.Windows.Settings/Firewall
      directives:
        description: Enable firewall parity with macOS and NixOS host hardening so baseline inbound filtering remains active
      settings:
        IsEnabled: true
