# WinGet DSC v3 - user-level baseline for Windows host
properties:
  configurationVersion: 0.2.0
  resources:
    - resource: Microsoft.Windows.Storage/Folder
      id: wallpaperFolder
      directives:
        description: Ensure wallpaper output directory exists
      settings:
        Path: "%USERPROFILE%\\Pictures\\wallpapers"
        Ensure: Present

    - resource: Microsoft.Windows.Registry/RegistryValue
      id: wallpaperPath
      dependsOn:
        - wallpaperFolder
      directives:
        description: Ensure desktop wallpaper points at declaratively materialized asset
      settings:
        keyPath: HKCU\Control Panel\Desktop
        valueName: Wallpaper
        valueData: "__NUCLEUS_ACTIVE_WALLPAPER__"
        valueType: String

    - resource: Microsoft.Windows.Registry/RegistryValue
      id: screenSaveActive
      directives:
        description: Enable screen saver so Windows enforces an automatic lock path similar to macOS and GNOME session-idle behavior
      settings:
        keyPath: HKCU\Control Panel\Desktop
        valueName: ScreenSaveActive
        valueData: "1"
        valueType: String

    - resource: Microsoft.Windows.Registry/RegistryValue
      id: screenSaverSecure
      directives:
        description: Require password on screen saver resume so unattended sessions are protected with the same intent as immediate-lock policies on macOS and NixOS
      settings:
        keyPath: HKCU\Control Panel\Desktop
        valueName: ScreenSaverIsSecure
        valueData: "1"
        valueType: String

    - resource: Microsoft.Windows.Registry/RegistryValue
      id: screenSaveTimeout
      directives:
        description: Set a 60-second idle timeout before launching the screen saver to keep lock enforcement aggressive and parity-aligned with strict POSIX lock posture
      settings:
        keyPath: HKCU\Control Panel\Desktop
        valueName: ScreenSaveTimeOut
        valueData: "60"
        valueType: String

    - resource: Microsoft.Windows.Registry/RegistryValue
      id: explorerHideFileExt
      directives:
        description: Keep file extensions visible so file types are never hidden in Explorer views
      settings:
        keyPath: HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
        valueName: HideFileExt
        valueData: 0
        valueType: DWord

    - resource: Microsoft.Windows.Registry/RegistryValue
      id: explorerHidden
      directives:
        description: Show hidden files and folders so Explorer surfaces full directory contents
      settings:
        keyPath: HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
        valueName: Hidden
        valueData: 1
        valueType: DWord

    - resource: Microsoft.Windows.Registry/RegistryValue
      id: explorerNavPaneShowAllFolders
      directives:
        description: Show all folders in the Explorer navigation pane so hierarchy context is always visible
      settings:
        keyPath: HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
        valueName: NavPaneShowAllFolders
        valueData: 1
        valueType: DWord

    - resource: Microsoft.Windows.Registry/RegistryValue
      id: explorerSearchboxTaskbarMode
      directives:
        description: Hide the taskbar search box to reduce persistent taskbar chrome while preserving keyboard-driven search workflows
      settings:
        keyPath: HKCU\Software\Microsoft\Windows\CurrentVersion\Search
        valueName: SearchboxTaskbarMode
        valueData: 0
        valueType: DWord

    - resource: Microsoft.Windows.Registry/RegistryValue
      id: explorerShowStatusBar
      directives:
        description: Keep the Explorer status bar visible so item counts and selection details are not hidden
      settings:
        keyPath: HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
        valueName: ShowStatusBar
        valueData: 1
        valueType: DWord

    - resource: Microsoft.Windows.Registry/RegistryValue
      id: explorerShowSuperHidden
      directives:
        description: Show protected operating system files for maximum filesystem transparency during maintenance tasks
      settings:
        keyPath: HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
        valueName: ShowSuperHidden
        valueData: 1
        valueType: DWord

    - resource: Microsoft.Windows.Registry/RegistryValue
      id: explorerShowSyncProviderNotifications
      directives:
        description: Suppress sync provider (OneDrive) promotional banners inside Explorer windows; the sync icon in the system tray remains available for monitoring
      settings:
        keyPath: HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
        valueName: ShowSyncProviderNotifications
        valueData: 0
        valueType: DWord

    - resource: Microsoft.Windows.Registry/RegistryValue
      id: explorerShowTaskViewButton
      directives:
        description: Hide the Task View button to keep taskbar chrome minimal while retaining workspace switching via keyboard shortcuts
      settings:
        keyPath: HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
        valueName: ShowTaskViewButton
        valueData: 0
        valueType: DWord

    - resource: Microsoft.Windows.Registry/RegistryValue
      id: explorerTaskbarDa
      directives:
        description: Hide the Widgets taskbar button to reduce persistent taskbar chrome while retaining access via Win+W; mirrors macOS StandardHideWidgets which hides Stage Manager widget strip for the same reason
      settings:
        keyPath: HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
        valueName: TaskbarDa
        valueData: 0
        valueType: DWord

    - resource: Microsoft.Windows.Registry/RegistryValue
      id: explorerTaskbarMn
      directives:
        description: Hide the Chat (Microsoft Teams Meet Now) taskbar button to reduce persistent chrome; Teams remains accessible via the Start menu and system tray
      settings:
        keyPath: HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
        valueName: TaskbarMn
        valueData: 0
        valueType: DWord

    - resource: Microsoft.Windows.Registry/RegistryValue
      id: explorerFullPathInTitle
      directives:
        description: Show the full folder path in Explorer title bars to mirror macOS Finder _FXShowPosixPathInTitle and GNOME Nautilus show-full-path-titles, keeping filesystem orientation consistent across hosts
      settings:
        keyPath: HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\CabinetState
        valueName: FullPath
        valueData: 1
        valueType: DWord

    - resource: PSDscResources/Script
      id: wallpaperRefresh
      dependsOn:
        - wallpaperPath
      directives:
        description: Refresh desktop parameters after wallpaper state updates
      settings:
        GetScript: |
          return @{ Result = "WallpaperRefresh" }
        TestScript: |
          return $false
        SetScript: |
          & "$env:SystemRoot\System32\rundll32.exe" "user32.dll,UpdatePerUserSystemParameters"

    - resource: Microsoft.Windows.Environment/Variable
      id: editorEnvVar
      directives:
        description: Set EDITOR to nvim to mirror the default editor behavior declared for macOS and NixOS
      settings:
        name: EDITOR
        value: nvim
        scope: User

    - resource: Microsoft.Windows.Environment/Variable
      id: homeEnvVar
      directives:
        description: Set HOME to %USERPROFILE% so Unix-heritage tools (git, ssh, curl) find the expected home directory path on Windows
      settings:
        name: HOME
        value: "%USERPROFILE%"
        scope: User

    - resource: Microsoft.Windows.Environment/Variable
      id: nixPathEnvVar
      directives:
        description: Register nixpkgs in NIX_PATH so <nixpkgs> references in Nix expressions resolve via the flake registry without a channels configuration
      settings:
        name: NIX_PATH
        value: nixpkgs=flake:nixpkgs
        scope: User

    - resource: Microsoft.Windows.Environment/Variable
      id: ollamaFlashAttentionEnvVar
      directives:
        description: >-
          Enable Ollama flash attention to reduce the memory overhead of the
          attention mechanism during inference, keeping peak VRAM usage lower
          on GPU-backed sessions and reducing RAM pressure on CPU-only runs.
          Mirrors OLLAMA_FLASH_ATTENTION set in the macOS launchd agent and
          the NixOS services.ollama.environmentVariables block.
      settings:
        name: OLLAMA_FLASH_ATTENTION
        value: "1"
        scope: User

    - resource: Microsoft.Windows.Environment/Variable
      id: ollamaHostEnvVar
      directives:
        description: >-
          Bind Ollama client tools (ollama CLI, oterm) to the loopback address
          so API calls never cross to LAN peers.  Mirrors OLLAMA_HOST set in
          home.sessionVariables on macOS and NixOS; explicit declaration guards
          against upstream Ollama default changes.
      settings:
        name: OLLAMA_HOST
        value: "127.0.0.1:11434"
        scope: User

    - resource: Microsoft.Windows.Environment/Variable
      id: ollamaKvCacheTypeEnvVar
      directives:
        description: >-
          Compress the KV cache with 4-bit quantisation to halve the KV-cache
          RAM footprint so larger context windows fit without evicting model
          weights.  Mirrors OLLAMA_KV_CACHE_TYPE set in the macOS launchd
          agent and the NixOS services.ollama.environmentVariables block.
      settings:
        name: OLLAMA_KV_CACHE_TYPE
        value: q4_0
        scope: User

    - resource: Microsoft.Windows.Environment/Variable
      id: ollamaNumCtxEnvVar
      directives:
        description: >-
          Set a 32 k token default context window so models that default to
          2 k or 4 k do not silently truncate long conversations.  Mirrors
          OLLAMA_NUM_CTX set in the macOS launchd agent and the NixOS
          services.ollama.environmentVariables block.
      settings:
        name: OLLAMA_NUM_CTX
        value: "32768"
        scope: User

    - resource: Microsoft.Windows.Environment/Variable
      id: visualEnvVar
      directives:
        description: Set VISUAL to nvim so terminal tooling follows the same preferred editor as POSIX hosts
      settings:
        name: VISUAL
        value: nvim
        scope: User

    - resource: Microsoft.Windows.Environment/Variable
      id: opencodeNoUpdateCheckEnvVar
      directives:
        description: Disable OpenCode auto-update globally to avoid version skew across machines. Updates are controlled via flake updates and managed environment versioning.
      settings:
        name: OPENCODE_NO_UPDATE_CHECK
        value: "1"
        scope: User
