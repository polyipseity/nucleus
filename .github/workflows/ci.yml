# CI: Build & Test
#
# Purpose:
#   - Run repository checks: setup, install, test, and build.
#   - Ensure a minimal, reproducible environment for quick CI feedback.
#
# Triggers:
#   - push, pull_request, workflow_dispatch
#
# Security & reproducibility notes:
#   - Use least-privilege permissions (contents: read) and pin action versions where appropriate.
#   - Use local caches to speed builds and reduce external load.

name: "CI: Build & Test"

on:
  pull_request:
  push:
    branches:
      - "**" # Listen to pushes on all branches
    tags-ignore:
      - "**" # Ignore tag pushes
  workflow_dispatch:

# Use concurrency to deduplicate runs.
# - For pull requests: group by `pr-<number>` so multiple commits to the same PR
#   cancel previous runs and only the latest is kept.
# - For direct pushes: fall back to deduplicating by commit SHA so identical
#   commits don't trigger multiple concurrent workflows.
# - Include the `github.workflow` name in the group to avoid cross-workflow collisions.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: "Build & Test"
    runs-on: ubuntu-latest
    env:
      # Keep flake support centralized at the job level so individual commands
      # stay readable while still working on fresh CI environments.
      NIX_CONFIG: experimental-features = nix-command flakes
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@4a754ab0c192f4d12cf88b5954b9dd13fd2d612e

      - name: Check Nix flake evaluation
        run: cd src && nix flake check

      - name: Run comprehensive Nix test suite
        run: |
          echo "Running Nix unit tests..."
          nix-instantiate --eval tests/nix/core-tests.nix
          nix-instantiate --eval tests/nix/module-imports-tests.nix
          nix-instantiate --eval tests/nix/module-options-tests.nix
          nix-instantiate --eval tests/nix/config-composition-tests.nix
          nix-instantiate --eval tests/nix/package-parity-tests.nix

      - name: Run shell script validation tests
        run: bash tests/scripts/script-validation-tests.sh

      - name: Check PowerShell syntax and lint
        run: nix run ./src#check-pwsh

      - name: Check shell scripts
        run: nix run ./src#check-sh
